backend:
  name: github
  repo: josipabarisic/norie-studio
  branch: main
  base_url: https://api.netlify.com

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: "site"
    label: "Sadržaj stranice"
    files:
      - name: "site"
        label: "Cijela stranica"
        file: "content/site.json"
        format: json
        fields:
          - label: "Hero (vrh početne stranice)"
            name: hero
            widget: object
            fields:
              - { label: "Nadnaslov", name: eyebrow, widget: string }
              - { label: "Glavni naslov (riječ između *zvjezdica* bit će kurziv)", name: headline, widget: text }
              - { label: "Podnaslov", name: subtitle, widget: text }
              - { label: "Tekst gumba 1", name: ctaPrimary, widget: string }
              - { label: "Tekst gumba 2", name: ctaSecondary, widget: string }

          - label: "Manifest (rečenica 'zašto dizajn')"
            name: manifesto
            widget: object
            fields:
              - { label: "Nadnaslov", name: eyebrow, widget: string }
              - { label: "Tekst (* * za kurziv)", name: text, widget: text }

          - label: "Traka usluga (na početnoj)"
            name: servicesBand
            widget: object
            fields:
              - { label: "Nadnaslov", name: eyebrow, widget: string }
              - { label: "Naslov", name: heading, widget: string }
              - { label: "Uvodni tekst", name: intro, widget: text }
              - { label: "Tekst gumba", name: buttonLabel, widget: string }

          - label: "Proces rada (koraci)"
            name: process
            widget: object
            fields:
              - { label: "Naslov sekcije", name: heading, widget: string }
              - label: "Koraci"
                name: steps
                widget: list
                fields:
                  - { label: "Broj (npr. 01)", name: num, widget: string }
                  - { label: "Naslov koraka", name: title, widget: string }
                  - { label: "Opis", name: body, widget: text }

          - label: "Usluge (lista koja se prikazuje na više mjesta)"
            name: services
            widget: list
            field: { label: "Usluga", name: service, widget: string }

          - label: "Projekti / Rad"
            name: projects
            widget: list
            fields:
              - { label: "Naziv projekta", name: name, widget: string }
              - { label: "Kategorija", name: category, widget: string }
              - { label: "Opis", name: description, widget: text }

          - label: "Stranica 'Rad' — uvod"
            name: work
            widget: object
            fields:
              - { label: "Uvodni tekst", name: intro, widget: text }

          - label: "Stranica 'Usluge'"
            name: servicesPage
            widget: object
            fields:
              - { label: "Uvodni tekst", name: intro, widget: text }
              - label: "Paketi / cjenik"
                name: tiers
                widget: list
                fields:
                  - { label: "Naziv paketa", name: name, widget: string }
                  - { label: "Opis", name: description, widget: text }
                  - { label: "Cijena (npr. 'od 500 €' ili 'Cijena na upit')", name: price, widget: string }
              - { label: "Naslov 'Sve što pokrivam'", name: allServicesHeading, widget: string }
              - { label: "Tekst 'Sve što pokrivam'", name: allServicesIntro, widget: text }
              - { label: "Tekst 'Za koga radim'", name: forWhom, widget: text }

          - label: "Stranica 'O meni'"
            name: studio
            widget: object
            fields:
              - label: "Biografija (svaki odlomak posebno)"
                name: bio
                widget: list
                field: { label: "Odlomak", name: paragraph, widget: text }
              - label: "Principi rada"
                name: principles
                widget: list
                field: { label: "Princip", name: principle, widget: string }

          - label: "Stranica 'Kontakt'"
            name: contact
            widget: object
            fields:
              - { label: "Naslov (* * za kurziv)", name: headline, widget: text }
              - { label: "Uvodni tekst", name: intro, widget: text }
              - { label: "Email", name: email, widget: string }
              - { label: "Vrijeme odgovora", name: responseTime, widget: string }
              - { label: "Lokacija / dostupnost", name: location, widget: string }
              - { label: "Instagram URL", name: instagram, widget: string, required: false }
              - { label: "Pinterest URL", name: pinterest, widget: string, required: false }
              - { label: "LinkedIn URL", name: linkedin, widget: string, required: false }

          - label: "CTA traka (poziv na akciju prije footera)"
            name: cta
            widget: object
            fields:
              - { label: "Nadnaslov", name: eyebrow, widget: string }
              - { label: "Naslov", name: heading, widget: string }
              - { label: "Tekst", name: text, widget: text }

          - label: "Footer"
            name: footer
            widget: object
            fields:
              - { label: "Tagline", name: tagline, widget: text }
              - { label: "NORIE Journal tekst", name: journalText, widget: text }
              - { label: "Copyright tekst", name: copyright, widget: string }
